<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
     integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <title>PulsoScena</title>
</head>
<body class="login-body">

     <div class="login-container"> 

        <div class="text-center mb-4">
            <h1 class="fw-bold ">🎭 PulsoScena</h1>
            <p>Descubrí lo que pasa cerca de ti</p>
        </div>

        <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" id="usuario" class="form-control" placeholder="Ingresá tu usuario"/>
        </div>

        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" id="contrasena" class="form-control" placeholder="Ingresá tu contraseña"/>
        </div>

        <button id="btn-login" class="btn btn-danger w-100">Ingresar</button>

        <p id="error" class="error-msg text-center mt-1" style="display:none">
            Usuario o contraseña incorrectos ⚠️
        </p>

        <p id="validacion" class="error-msg text-center mt-1" style="display:none">
            Debe llenar todos los campos ⚠️
        </p>



    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
